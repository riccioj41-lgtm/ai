<text x="760" y="410" class="title">Realtime Code (pseudocode)</text>
<rect x="760" y="420" width="480" height="300" fill="none" stroke="black"/>
<text x="770" y="440">for t in range(T):</text>
<text x="770" y="462">    S = α·align + β·urg + γ·nov + δ·rew − κ·cost/C</text>
<text x="770" y="484">    a = softmax(S)</text>
<text x="770" y="506">    y = tanh(W_L·L + W_P·P + W_E·E + W_R·R + b)</text>
<text x="770" y="528">    ỹ = y + Γy</text>
<text x="770" y="550">    M = Σ_i a_i ỹ_i</text>
<text x="770" y="572">    ε = Normal(M, σ) − g(M)</text>
<text x="770" y="594">    E += rand(N) * ε</text>
<text x="770" y="616">    R = ρR + η|ε|ỹ</text>
<text x="770" y="638">    if depth > D_max(C, health): prune()</text>
<text x="770" y="660">    C *= 0.95 * (1 + 0.02*(Cats + Health))</text>
